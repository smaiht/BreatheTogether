name: Release macOS

on:
  push:
    branches: [master, main]
    paths: ['macos/**']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: contains(github.event.head_commit.message, '[mac]')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VER=$(date +'%Y%m%d-%H%M%S')
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build universal binary
        run: |
          cd macos
          xcodebuild -scheme BreatheTogether -configuration Release -arch arm64 -derivedDataPath build-arm64 MARKETING_VERSION="${{ steps.version.outputs.version }}" build
          xcodebuild -scheme BreatheTogether -configuration Release -arch x86_64 -derivedDataPath build-x86 MARKETING_VERSION="${{ steps.version.outputs.version }}" build
          APP="build-arm64/Build/Products/Release/Breathe Together.app"
          lipo -create \
            "build-arm64/Build/Products/Release/Breathe Together.app/Contents/MacOS/Breathe Together" \
            "build-x86/Build/Products/Release/Breathe Together.app/Contents/MacOS/Breathe Together" \
            -output "$APP/Contents/MacOS/Breathe Together"

      - name: Create DMG
        run: |
          npm install -g create-dmg
          cd macos
          create-dmg "build-arm64/Build/Products/Release/Breathe Together.app" . || true
          mv *.dmg "BreatheTogether-${{ steps.version.outputs.version }}.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mac-v${{ steps.version.outputs.version }}
          name: macOS v${{ steps.version.outputs.version }}
          files: macos/BreatheTogether-${{ steps.version.outputs.version }}.dmg
          body: |
            ## Install

            **Option 1 — One command (recommended):**
            ```
            curl -sL https://raw.githubusercontent.com/smaiht/BreatheTogether/main/install.sh | bash
            ```

            **Option 2 — Manual DMG:**
            1. Download the `.dmg` below
            2. Drag "Breathe Together" to Applications
            3. Right-click the app → Open → Open

            **Option 3 — Terminal fix (if app won't open after manual install):**
            ```
            xattr -cr "/Applications/Breathe Together.app"
            ```
