name: BreatheTogether
options:
  bundleIdPrefix: com.breathetogether
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  BreatheTogether:
    type: application
    platform: macOS
    sources:
      - path: BreatheTogether
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.breathetogether.app
        PRODUCT_NAME: Breathe Together
        MARKETING_VERSION: "DEV"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: BreatheTogether/Info.plist
        CODE_SIGN_ENTITLEMENTS: BreatheTogether/BreatheTogether.entitlements
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
